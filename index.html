<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Đăng nhập hệ thống</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #3a7bd5, #00d2ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: white;
      width: 100%;
      max-width: 380px;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #2c3e50;
    }

    .input-group {
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid #dcdcdc;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #3a7bd5;
      box-shadow: 0 0 0 2px rgba(58,123,213,0.2);
    }

    .error-input {
      border-color: #e74c3c !important;
      background: #fff5f5;
    }

    button {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: #3a7bd5;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2f66c2;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .error-message {
      margin-top: 12px;
      font-size: 14px;
      color: #e74c3c;
      text-align: center;
      min-height: 20px;
    }

    .footer {
      margin-top: 25px;
      text-align: center;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="login-container">
  <h2>🔐 Đăng nhập hệ thống</h2>

  <!-- 🔥 Disable default browser validation -->
  <form id="loginForm" novalidate>
    <div class="input-group">
      <input type="email" id="email" placeholder="Nhập email">
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Nhập mật khẩu">
    </div>

    <button type="submit" id="loginBtn">Đăng nhập</button>
  </form>

  <div id="error" class="error-message"></div>

  <div class="footer">
    Hệ thống giám sát chi nhánh
  </div>
</div>

<script>
const client = window.supabase.createClient(
  "https://jlbuvtzwhqjqpubooids.supabase.co",
  "sb_publishable_QHDS_B0lP5fnugQryKPUNw_H3PIj290"
);

// Auto redirect if logged in
async function checkLoggedIn() {
  const { data: { session } } = await client.auth.getSession();
  if (session) {
    window.location.replace("dashboard.html");
  }
}
checkLoggedIn();

const form = document.getElementById("loginForm");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const button = document.getElementById("loginBtn");
const errorDiv = document.getElementById("error");

function showError(message) {
  errorDiv.innerText = message;
}

function clearErrors() {
  errorDiv.innerText = "";
  emailInput.classList.remove("error-input");
  passwordInput.classList.remove("error-input");
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  clearErrors();

  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();

  // ✅ Custom Vietnamese validation
  if (!email) {
    showError("Vui lòng nhập email.");
    emailInput.classList.add("error-input");
    return;
  }

  if (!password) {
    showError("Vui lòng nhập mật khẩu.");
    passwordInput.classList.add("error-input");
    return;
  }

  button.disabled = true;
  button.innerText = "Đang đăng nhập...";

  const { error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    showError("Email hoặc mật khẩu không đúng.");
    emailInput.classList.add("error-input");
    passwordInput.classList.add("error-input");
    button.disabled = false;
    button.innerText = "Đăng nhập";
    return;
  }

  window.location.replace("dash.html");
});
</script>

</body>
</html>
