<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Hệ Thống Giám Sát Kho Lạnh</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="dash.css">
</head>
<body>

<div class="header">
  <h2>📊 HỆ THỐNG GIÁM SÁT KHO LẠNH</h2>
  <div class="user-info">
    <div class="user-avatar" id="userAvatar"></div>
    <span id="userEmail"></span>
    <button class="logout-btn" onclick="logout()">Đăng xuất</button>
  </div>
</div>

<!-- Store Buttons -->
<div class="store-bar" id="storeButtons"></div>

<!-- Date Filter -->
<div class="date-filter">
  <div class="date-tabs">
    <button class="date-tab active" onclick="selectDateTab('today')">Hôm nay</button>
    <button class="date-tab" onclick="selectDateTab('yesterday')">Hôm qua</button>
    <button class="date-tab" onclick="selectDateTab('3days')">3 ngày trước</button>
    <button class="date-tab" onclick="selectDateTab('5days')">5 ngày trước</button>
  </div>
  
  <div class="date-picker">
    <input type="date" id="startDate" class="date-input">
    <span>→</span>
    <input type="date" id="endDate" class="date-input">
    <button class="apply-btn" onclick="applyCustomDate()">Áp dụng</button>
  </div>
</div>

<!-- Nodes Grid -->
<div id="mainContent">
  <div class="loading">Đang tải dữ liệu...</div>
</div>

<script src="dash.js"></script>
</body>
</html>
